name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  linux-release-check:
    name: Linux release checklist
    runs-on: ubuntu-latest
    steps:
      - name: Check out zlib
        uses: actions/checkout@v4
        with:
          path: zlib
      - name: Check out project_tools sibling
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/project_tools
          path: project_tools
      - name: Check out cryptolib sibling
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/cryptolib
          path: cryptolib
      - name: Set up Alire
        # Pin the toolchain the manifests require. setup-alire@v5 defaults to
        # alr 2.1.0, whose index carries gnat_native 15.2.1; v4's alr 2.0.2 cannot
        # resolve it.
        uses: alire-project/setup-alire@v5
        with:
          toolchain: gnat_native=15.2.1 gprbuild
      - name: Install workflow dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libaunit-dev || sudo apt-get install -y libaunit22-dev || sudo apt-get install -y libaunit24-dev
      # config/zlib_config.gpr is Alire-generated and gitignored, so a fresh clone
      # has none. `alr build` generates it; gprbuild on its own does not, and
      # zlib.gpr imports it.
      - name: Build the library
        working-directory: zlib
        run: alr --non-interactive build

      - name: Build and run the test suite
        working-directory: zlib/tests
        run: |
          alr --non-interactive build
          ./bin/tests

      - name: Build aggregate release checker
        working-directory: zlib
        run: alr exec -- gprbuild -P tools/tools.gpr
      - name: Run aggregate release checker
        working-directory: zlib
        run: tools/bin/check_all
